apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "com.kontaki.app"
    compileSdk 34
    
    // Desabilitar verificação de classes duplicadas do Android Gradle Plugin
    androidResources {
        noCompress 'webp'
    }

    defaultConfig {
        applicationId "com.kontaki.app"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

tasks.whenTaskAdded { task ->
    if (task.name == 'checkDebugDuplicateClasses' || task.name == 'checkReleaseDuplicateClasses') {
        task.enabled = false
    }
}

dependencies {
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    
    // Excluir kotlin-stdlib-jdk8 de todas as dependências
    implementation('org.jetbrains.kotlin:kotlin-stdlib:1.8.22') {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
    
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}

configurations.all {
    resolutionStrategy {
        // Forçar Kotlin 1.8.22
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
        force 'org.jetbrains.kotlin:kotlin-reflect:1.8.22'
        
        // Excluir kotlin-stdlib-jdk8 completamente
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
}
