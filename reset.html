<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Reset Kontaki</title>
</head>
<body style="font-family: sans-serif; padding: 20px">

<h2>Reset completo do Kontaki</h2>

<button onclick="resetAll()" style="padding:20px;font-size:18px;background:red;color:white;border:none;border-radius:10px;cursor:pointer">
  Apagar TUDO e reiniciar app
</button>

<p id="msg"></p>

<script>
async function resetAll() {
  const msg = document.getElementById("msg");
  msg.textContent = "A limpar dados...";

  try {
    // 1. IndexedDB
    indexedDB.deleteDatabase("kontaki_db");

    // 2. LocalStorage + SessionStorage
    localStorage.clear();
    sessionStorage.clear();

    // 3. Cache Storage (Service Worker cache)
    if (window.caches) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }

    // 4. Service Workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        await reg.unregister();
      }
    }

    msg.textContent = "Reset concluído. A reiniciar...";

    setTimeout(() => {
      location.href = "/";
      location.reload(true);
    }, 1200);

  } catch (e) {
    msg.textContent = "Erro: " + e.message;
  }
}
</script>

</body>
</html>
